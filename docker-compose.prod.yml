name: farmacia-vida

services:
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - app_public:/var/www/html/public:ro
      - app_storage:/var/www/html/storage:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      php:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/up >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - farmacia_net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  php:
    build:
      context: .
      dockerfile: php/Dockerfile
      target: app
    restart: unless-stopped
    env_file:
      - ${APP_ENV_FILE:-./.env.aws}
    environment:
      APP_NAME: ${APP_NAME:-Farmacia Vida}
      APP_ENV: production
      APP_KEY: ${APP_KEY:?APP_KEY debe configurarse en .env.aws}
      APP_DEBUG: "false"
      APP_URL: ${APP_URL:?APP_URL debe configurarse en .env.aws}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${MYSQL_DATABASE:-farmacia_vida}
      DB_USERNAME: ${MYSQL_USER:-farmacia_user}
      DB_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD debe configurarse en .env.aws}
      CACHE_STORE: file
      QUEUE_CONNECTION: sync
      SESSION_DRIVER: file
      WAIT_FOR_DB: "true"
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-false}
      RUN_SEEDERS: ${RUN_SEEDERS:-false}
      CACHE_ROUTES: ${CACHE_ROUTES:-false}
    volumes:
      - app_public:/var/www/html/public
      - app_storage:/var/www/html/storage
      - app_cache:/var/www/html/bootstrap/cache
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - farmacia_net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    command: --default-time-zone=-06:00 --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD debe configurarse en .env.aws}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-farmacia_vida}
      MYSQL_USER: ${MYSQL_USER:-farmacia_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD debe configurarse en .env.aws}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$${MYSQL_ROOT_PASSWORD}\" --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - farmacia_net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  app_cache:
  app_public:
  app_storage:
  mysql_data:

networks:
  farmacia_net:
    driver: bridge
