version: '3.8'

services:

  nginx:
    image: nginx:alpine
    container_name: farmacia_nginx
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - farmacia_net

  php:
    build:
      context: .
      dockerfile: php/Dockerfile
    container_name: farmacia_php
    volumes:
      - ./src:/var/www/html
      - farmacia_vendor:/var/www/html/vendor
      - farmacia_storage:/var/www/html/storage
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - farmacia_net

  mysql:
    image: mysql:8.0
    container_name: farmacia_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_secret
      MYSQL_DATABASE: farmacia_vida
      MYSQL_USER: farmacia_user
      MYSQL_PASSWORD: farmacia_pass
    ports:
      - "3307:3306"
    volumes:
      - farmacia_mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_secret"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - farmacia_net

  node:
    image: node:20-alpine
    container_name: farmacia_node
    working_dir: /var/www/html
    volumes:
      - ./src:/var/www/html
      - farmacia_node_modules:/var/www/html/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    networks:
      - farmacia_net

volumes:
  farmacia_mysql_data:
  farmacia_vendor:
  farmacia_storage:
  farmacia_node_modules:

networks:
  farmacia_net:
    driver: bridge